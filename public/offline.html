<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DivineLink — Hors ligne</title>
  <meta name="theme-color" content="#0c7bb3" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f7fa;
      color: #1a2332;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 40px 32px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .icon {
      width: 72px;
      height: 72px;
      background: #e8f4fd;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }
    .icon svg { width: 36px; height: 36px; color: #0c7bb3; }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 12px; }
    p { color: #64748b; line-height: 1.6; margin-bottom: 24px; }
    .badge {
      display: inline-block;
      background: #e8f4fd;
      color: #0c7bb3;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 99px;
      margin-bottom: 24px;
    }
    button {
      background: #0c7bb3;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 12px 28px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: background 0.15s;
    }
    button:hover { background: #0a6a9a; }
    .note { margin-top: 20px; font-size: 0.8rem; color: #94a3b8; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="1" y1="1" x2="23" y2="23"/>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
        <line x1="12" y1="20" x2="12.01" y2="20"/>
      </svg>
    </div>
    <div class="badge">Mode hors ligne</div>
    <h1>Pas de connexion</h1>
    <p>
      DivineLink fonctionne entièrement hors ligne.
      Vos données sont stockées localement et restent
      accessibles. Retournez à l'application pour continuer.
    </p>
    <button onclick="window.location.href='/'">
      Retourner à DivineLink
    </button>
    <p class="note">Toutes vos données restent sécurisées sur cet appareil.</p>
  </div>
</body>
</html>
